services:
  wordpress:
    image: wordpress:latest
    depends_on:
      - db
    ports:
      - "8080:80"
    environment:
      WORDPRESS_DB_HOST: db
      WORDPRESS_DB_USER: ${DB_USER:-wp}
      WORDPRESS_DB_PASSWORD: ${DB_PASSWORD:-wp}
      WORDPRESS_DB_NAME: ${DB_NAME:-lomais}
      WORDPRESS_DEBUG: "1"
      WORDPRESS_CONFIG_EXTRA: |
        define('WP_DEBUG_LOG', true);
        define('WP_DEBUG_DISPLAY', false);
        define('SCRIPT_DEBUG', true);
        define('WP_ENVIRONMENT_TYPE', 'local');
    volumes:
      - ./wp-content/themes/lomais:/var/www/html/wp-content/themes/lomais
      - ../wpt-ficus:/var/www/html/wp-content/themes/ficus
    networks:
      - lomais

  db:
    image: mysql:8.0
    environment:
      MYSQL_DATABASE: ${DB_NAME:-lomais}
      MYSQL_USER: ${DB_USER:-wp}
      MYSQL_PASSWORD: ${DB_PASSWORD:-wp}
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-root}
    volumes:
      - db_data:/var/lib/mysql
    networks:
      - lomais

  phpmyadmin:
    image: phpmyadmin/phpmyadmin
    depends_on:
      - db
    ports:
      - "8081:80"
    environment:
      PMA_HOST: db
      PMA_USER: ${DB_USER:-wp}
      PMA_PASSWORD: ${DB_PASSWORD:-wp}
    networks:
      - lomais

volumes:
  db_data:

networks:
  lomais:
